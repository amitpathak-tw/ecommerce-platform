server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: order-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/order_db}
    username: ${DB_USERNAME:order_user}
    password: ${DB_PASSWORD:order_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

services:
  inventory:
    base-url: ${INVENTORY_BASE_URL:http://localhost:8082}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
